<div class="page-shell">
  <div class="page-header">
    <h2>Mis citas</h2>
    <p>Consulta el historial y estado de tus citas.</p>
  </div>

  <!-- Mensaje de error -->
  <div *ngIf="error" class="alert error">{{ error }}</div>

  <div class="card nb-card">
    <!-- Estado vacío -->
    <div *ngIf="list.length === 0 && !error" class="empty-state">
      No tienes citas registradas.
    </div>

    <!-- Listado de citas -->
    <div *ngFor="let a of list" class="appointment-item">
      <div class="appointment-head">
        <div>
          <!-- El backend devuelve service, no serviceId -->
          <strong class="appointment-title">
            {{ a.service?.name || 'Servicio sin nombre' }}
          </strong>

          <p class="appointment-subtitle">
            Estado: {{ a.status }}
          </p>
        </div>
      </div>

      <div class="appointment-meta">
        <!-- Fechas de inicio y fin -->
        <span>
          {{ a.startAt | date:'short' }} → {{ a.endAt | date:'short' }}
        </span>

        <!-- Nombre del barbero -->
        <span *ngIf="a.barber?.name">
          Barbero: {{ a.barber.name }}
        </span>

        <!-- Notas opcionales -->
        <span *ngIf="a.notes">
          Notas: {{ a.notes }}
        </span>
      </div>
    </div>
  </div>
</div>
