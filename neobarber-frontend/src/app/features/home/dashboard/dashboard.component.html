<div class="dashboard-wrapper">
  <div class="overlay-pattern"></div>
  <div class="dashboard-card">
    <img src="assets/logo-neobarber.png" alt="Logo NeoBarber" class="logo-neobarber" />
    <div class="tools-row" aria-hidden="true">
      <span>💈</span>
      <span>✂️</span>
      <span>🧴</span>
    </div>
    <div class="welcome-text">
      <h1>Bienvenido a NeoBarber</h1>
      <p>¡Comencemos!</p>
    </div>
    <div class="user-icon" aria-hidden="true">👥</div>
    <div class="actions">
      <button class="btn-login" (click)="goLogin()">Iniciar sesión</button>
      <button class="btn-register" (click)="goRegister()">Registrar</button>
    </div>
  </div>
</div>
